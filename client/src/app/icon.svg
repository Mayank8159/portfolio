<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Dark background -->
  <rect width="32" height="32" rx="8" fill="#030014"/>
  <!-- Cyan glow border -->
  <rect x="1" y="1" width="30" height="30" rx="7" stroke="#22d3ee" stroke-width="1.5" stroke-opacity="0.6"/>
  <!-- "M" lettermark in cyan -->
  <text
    x="16"
    y="22"
    text-anchor="middle"
    font-family="'Courier New', Courier, monospace"
    font-weight="900"
    font-size="18"
    fill="#22d3ee"
    filter="url(#glow)"
  >M</text>
  <!-- Cyan glow filter -->
  <defs>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
</svg>
